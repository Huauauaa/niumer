# Build Wails desktop binaries and attach them to a GitHub Release when you push a version tag.
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Manual run (workflow_dispatch) builds artifacts only; the Release job runs only for tag pushes.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: niumer-linux-amd64
            package_file: niumer-linux-amd64.tar.gz
          - os: macos-latest
            asset_name: niumer-darwin-arm64
            package_file: niumer-darwin-arm64.zip
          - os: windows-latest
            asset_name: niumer-windows-amd64
            package_file: niumer-windows-amd64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Ubuntu 24+ ships WebKitGTK 4.1 only; use webkit2_41 to link the right stack (see wails.io Linux install notes).
      - name: Wails build
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            wails build -clean -tags webkit2_41
          else
            wails build -clean
          fi

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x build/bin/niumer
          tar -czvf "${{ matrix.package_file }}" -C build/bin niumer

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          zip -r "../../${{ matrix.package_file }}" niumer.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/niumer.exe -DestinationPath "${{ matrix.package_file }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.package_file }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
